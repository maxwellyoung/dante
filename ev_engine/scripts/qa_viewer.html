<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; }
body { background: #0a0a0a; overflow: hidden; }
canvas { display: block; }
#stats {
  position: fixed; top: 12px; left: 12px; z-index: 10;
  font: 13px/1.5 'SF Mono', 'Menlo', monospace; color: rgba(255,255,255,0.6);
  pointer-events: none;
}
</style>
</head><body>
<div id="stats"></div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const params = new URLSearchParams(location.search);
const modelFile = params.get('model');
const angle = params.get('angle') || 'quarter'; // front, side, quarter, top, back

if (!modelFile) {
  document.getElementById('stats').textContent = 'Usage: ?model=file.glb&angle=quarter';
  document.title = 'ERROR';
}

const SIZE = 1200;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);
const camera = new THREE.PerspectiveCamera(35, 1, 0.01, 100);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(SIZE, SIZE);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// Lighting — 3-point, warm key, cool fill (match engine aesthetic)
scene.add(new THREE.AmbientLight(0xffffff, 0.35));

const key = new THREE.DirectionalLight(0xffeedd, 1.3);
key.position.set(4, 6, 5);
key.castShadow = true;
key.shadow.mapSize.set(1024, 1024);
scene.add(key);

const fill = new THREE.DirectionalLight(0xddeeff, 0.35);
fill.position.set(-4, 3, -3);
scene.add(fill);

const rim = new THREE.DirectionalLight(0xffffff, 0.5);
rim.position.set(0, 1, -5);
scene.add(rim);

// Ground shadow catcher
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.ShadowMaterial({ opacity: 0.15 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);
renderer.shadowMap.enabled = true;

// Environment for reflections
const pmrem = new THREE.PMREMGenerator(renderer);
const envScene = new THREE.Scene();
const envGeo = new THREE.SphereGeometry(20, 32, 32);
const envMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: {
    colorTop: { value: new THREE.Color(0x222222) },
    colorBottom: { value: new THREE.Color(0x050505) }
  },
  vertexShader: `varying vec3 vWorldPos; void main() { vec4 wp = modelMatrix * vec4(position, 1.0); vWorldPos = wp.xyz; gl_Position = projectionMatrix * viewMatrix * wp; }`,
  fragmentShader: `uniform vec3 colorTop; uniform vec3 colorBottom; varying vec3 vWorldPos; void main() { float h = normalize(vWorldPos).y * 0.5 + 0.5; gl_FragColor = vec4(mix(colorBottom, colorTop, h), 1.0); }`
});
envScene.add(new THREE.Mesh(envGeo, envMat));
scene.environment = pmrem.fromScene(envScene).texture;

// Camera angles — fixed positions for consistent QA comparison
const ANGLES = {
  front:   { pos: [0, 0.6, 1],    target: [0, 0.35, 0] },
  side:    { pos: [1, 0.6, 0],    target: [0, 0.35, 0] },
  quarter: { pos: [0.8, 0.7, 0.8], target: [0, 0.3, 0] },
  top:     { pos: [0, 1.5, 0.01], target: [0, 0, 0] },
  back:    { pos: [0, 0.6, -1],   target: [0, 0.35, 0] },
  low:     { pos: [0.7, 0.2, 0.7], target: [0, 0.3, 0] },
};

function setCameraAngle(angleName, maxDim, centerY) {
  const a = ANGLES[angleName] || ANGLES.quarter;
  const d = maxDim * 2.2; // distance scales with model
  camera.position.set(a.pos[0] * d, a.pos[1] * d + centerY * 0.3, a.pos[2] * d);
  camera.lookAt(a.target[0], a.target[1] * maxDim + centerY * 0.5, a.target[2]);
  camera.updateProjectionMatrix();
}

// Load
if (modelFile) {
  const loader = new GLTFLoader();
  loader.load(modelFile, (gltf) => {
    const model = gltf.scene;

    // Enable shadows
    model.traverse(child => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });

    // Center and normalize scale
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 1.0 / maxDim; // normalize to ~1 unit

    model.position.sub(center).multiplyScalar(scale);
    model.scale.multiplyScalar(scale);

    // Sit on ground
    const scaledBox = new THREE.Box3().setFromObject(model);
    model.position.y -= scaledBox.min.y;

    scene.add(model);

    // Tri count
    let tris = 0, meshCount = 0;
    model.traverse(c => {
      if (c.isMesh) {
        meshCount++;
        tris += c.geometry.index
          ? c.geometry.index.count / 3
          : c.geometry.attributes.position.count / 3;
      }
    });

    // Set camera
    const centerY = (scaledBox.max.y - scaledBox.min.y) * 0.5;
    setCameraAngle(angle, 1.0, centerY);

    // ── AUTOMATED SCORING v2 ──
    const scores = {};

    // 1. Tri density — use SURFACE AREA not volume (shell objects like pianos/bathtubs
    //    have large bounding volume but thin walls — volume penalizes them unfairly)
    const surfaceArea = 2 * (size.x * size.y + size.y * size.z + size.x * size.z);
    const triPerSqm = tris / Math.max(surfaceArea, 0.01);
    // Scale thresholds by object size — large objects need fewer tris/m²
    const sizeScale = Math.max(1, maxSize / 0.5); // objects >0.5m get relaxed thresholds
    const adjDensity = triPerSqm * sizeScale;
    if (adjDensity < 100) scores.triDensity = { score: 30, note: `${Math.round(triPerSqm)}/m² — very sparse` };
    else if (adjDensity < 300) scores.triDensity = { score: 60, note: `${Math.round(triPerSqm)}/m² — low` };
    else if (adjDensity < 600) scores.triDensity = { score: 80, note: `${Math.round(triPerSqm)}/m² — ok` };
    else if (adjDensity < 1500) scores.triDensity = { score: 92, note: `${Math.round(triPerSqm)}/m² — good` };
    else scores.triDensity = { score: 95, note: `${Math.round(triPerSqm)}/m² — dense` };

    // 2. Smooth shading — check normals across SHARED EDGES (adjacent triangles)
    //    Build edge adjacency map: for each edge (pair of vertex indices), collect face normals.
    //    If adjacent faces have similar normals → smooth. Different → hard edge.
    let smoothEdges = 0, totalEdges = 0;
    model.traverse(c => {
      if (c.isMesh && c.geometry) {
        const pos = c.geometry.attributes.position;
        const norm = c.geometry.attributes.normal;
        const idx = c.geometry.index;
        if (!norm || !idx) return;

        // Build face normals + edge map
        const edgeMap = new Map();
        const faceCount = idx.count / 3;
        for (let f = 0; f < faceCount; f++) {
          const i0 = idx.getX(f*3), i1 = idx.getX(f*3+1), i2 = idx.getX(f*3+2);
          // Face normal from vertex normals (average)
          const fn = {
            x: (norm.getX(i0) + norm.getX(i1) + norm.getX(i2)) / 3,
            y: (norm.getY(i0) + norm.getY(i1) + norm.getY(i2)) / 3,
            z: (norm.getZ(i0) + norm.getZ(i1) + norm.getZ(i2)) / 3,
          };
          // Normalize
          const len = Math.sqrt(fn.x*fn.x + fn.y*fn.y + fn.z*fn.z) || 1;
          fn.x /= len; fn.y /= len; fn.z /= len;

          const edges = [[i0,i1],[i1,i2],[i2,i0]];
          for (const [a,b] of edges) {
            const key = Math.min(a,b) + ',' + Math.max(a,b);
            if (!edgeMap.has(key)) edgeMap.set(key, []);
            edgeMap.get(key).push(fn);
          }
        }

        // Check each shared edge
        for (const [, faces] of edgeMap) {
          if (faces.length !== 2) continue; // boundary or non-manifold
          totalEdges++;
          const dot = faces[0].x*faces[1].x + faces[0].y*faces[1].y + faces[0].z*faces[1].z;
          if (dot > 0.85) smoothEdges++; // faces agree within ~30°
        }
      }
    });
    const smoothRatio = totalEdges > 0 ? smoothEdges / totalEdges : 0;
    if (smoothRatio > 0.85) scores.smoothing = { score: 95, note: `${(smoothRatio*100).toFixed(0)}% smooth edges` };
    else if (smoothRatio > 0.7) scores.smoothing = { score: 80, note: `${(smoothRatio*100).toFixed(0)}% smooth` };
    else if (smoothRatio > 0.5) scores.smoothing = { score: 60, note: `${(smoothRatio*100).toFixed(0)}% smooth — noticeable faceting` };
    else scores.smoothing = { score: 35, note: `${(smoothRatio*100).toFixed(0)}% smooth — very faceted` };

    // 3. Proportions
    const aspectXZ = Math.max(size.x, size.z) / Math.max(Math.min(size.x, size.z), 0.01);
    const aspectY = size.y / Math.max(Math.max(size.x, size.z), 0.01);
    let propScore = 90, propNote = 'balanced';
    if (aspectXZ > 5 || aspectY > 5) { propScore = 40; propNote = `extreme ${aspectXZ.toFixed(1)}:1`; }
    else if (aspectXZ > 3 || aspectY > 3) { propScore = 65; propNote = `stretched ${aspectXZ.toFixed(1)}:1`; }
    scores.proportions = { score: propScore, note: propNote };

    // 4. Materials
    const uniqueMats = new Set();
    model.traverse(c => { if (c.isMesh && c.material) {
      const mats = Array.isArray(c.material) ? c.material : [c.material];
      mats.forEach(m => uniqueMats.add(m.name || m.uuid));
    }});
    const matCount = uniqueMats.size;
    if (matCount >= 3) scores.materials = { score: 95, note: `${matCount} materials — rich` };
    else if (matCount >= 2) scores.materials = { score: 80, note: `${matCount} materials — ok` };
    else scores.materials = { score: 45, note: `${matCount} material — monotone` };

    // 5. Scale
    const maxSize = Math.max(size.x, size.y, size.z);
    const minSize = Math.min(size.x, size.y, size.z);
    if (maxSize > 10) scores.scale = { score: 30, note: `${maxSize.toFixed(1)}m — too large` };
    else if (maxSize < 0.05) scores.scale = { score: 30, note: `${maxSize.toFixed(3)}m — too small` };
    else if (minSize < 0.01) scores.scale = { score: 50, note: `thin: ${minSize.toFixed(3)}m` };
    else scores.scale = { score: 90, note: `${maxSize.toFixed(2)}m — realistic` };

    // 6. Tri count — HL2 benchmarks, higher ceiling for hero objects
    if (tris < 200) scores.triCount = { score: 30, note: `${Math.round(tris)} — placeholder` };
    else if (tris < 500) scores.triCount = { score: 60, note: `${Math.round(tris)} — simple prop` };
    else if (tris < 1000) scores.triCount = { score: 78, note: `${Math.round(tris)} — basic furniture` };
    else if (tris < 2000) scores.triCount = { score: 88, note: `${Math.round(tris)} — furniture` };
    else if (tris < 4000) scores.triCount = { score: 95, note: `${Math.round(tris)} — hero quality` };
    else if (tris < 6000) scores.triCount = { score: 90, note: `${Math.round(tris)} — hero (dense)` };
    else scores.triCount = { score: 70, note: `${Math.round(tris)} — over budget` };

    // 7. NEW: Silhouette coverage — how much of the frame does the model fill?
    //    Uses the normalized bounding box projected to screen.
    const projBox = new THREE.Box3().setFromObject(model);
    const projSize = projBox.getSize(new THREE.Vector3());
    const frameFill = Math.max(projSize.x, projSize.y) / 1.2; // ~0-1 range
    if (frameFill > 0.3) scores.coverage = { score: 90, note: `${(frameFill*100).toFixed(0)}% frame fill` };
    else if (frameFill > 0.15) scores.coverage = { score: 70, note: `${(frameFill*100).toFixed(0)}% — small in frame` };
    else scores.coverage = { score: 40, note: `${(frameFill*100).toFixed(0)}% — tiny, lost detail` };

    // Weighted total
    const weights = { triDensity: 15, smoothing: 25, proportions: 10, materials: 10, scale: 10, triCount: 20, coverage: 10 };
    let totalScore = 0, totalWeight = 0;
    for (const [k, w] of Object.entries(weights)) {
      if (scores[k]) { totalScore += scores[k].score * w; totalWeight += w; }
    }
    const finalScore = Math.round(totalScore / totalWeight);

    // Version threshold (passed via URL param)
    const version = parseInt(params.get('version') || '1');
    const threshold = Math.min(55 + version * 5, 90); // v1=60, v2=65, v3=70, ...
    const pass = finalScore >= threshold;

    // Stats display
    let statsHtml =
      `${Math.round(tris).toLocaleString()} tris · ${meshCount} meshes<br>` +
      `${size.x.toFixed(2)} × ${size.y.toFixed(2)} × ${size.z.toFixed(2)} m<br>` +
      `angle: ${angle}<br><br>` +
      `<b style="color:${pass ? '#4f4' : '#f44'};font-size:16px">SCORE: ${finalScore}/100 ${pass ? 'PASS' : 'FAIL'}</b> (v${version} threshold: ${threshold})<br>`;
    for (const [k, v] of Object.entries(scores)) {
      const col = v.score >= 80 ? '#4f4' : v.score >= 60 ? '#ff4' : '#f44';
      statsHtml += `<span style="color:${col}">${k}: ${v.score}</span> ${v.note}<br>`;
    }
    document.getElementById('stats').innerHTML = statsHtml;

    // Render a couple frames then signal ready
    let frames = 0;
    function renderLoop() {
      renderer.render(scene, camera);
      frames++;
      if (frames < 5) requestAnimationFrame(renderLoop);
      else document.title = `READY ${Math.round(tris)} tris score:${finalScore} ${pass ? 'PASS' : 'FAIL'}`;
    }
    renderLoop();

  }, undefined, (err) => {
    document.getElementById('stats').textContent = 'Load failed: ' + err.message;
    document.title = 'ERROR';
  });
}
</script>
</body></html>
